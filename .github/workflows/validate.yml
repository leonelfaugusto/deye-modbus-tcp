name: Validate

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Run daily — catches upstream HA/HACS breakage even without new commits
    - cron: "0 6 * * *"

jobs:
  hassfest:
    name: hassfest (Home Assistant)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
